services:
  # SQL Server
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: commerce_db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong!Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  # Redis (Cache)
  redis:
    image: redis:alpine
    container_name: commerce_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Seq (Structured Logging)
  seq:
    image: datalust/seq:latest
    container_name: commerce_seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=YourStrong!Passw0rd
    ports:
      - "5341:5341" # Ingestion
      - "8081:80"   # UI
    volumes:
      - seq_data:/data

  # Jaeger (Distributed Tracing)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: commerce_jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC (Standard for .NET)
      - "4318:4318"   # OTLP HTTP
    # No volume needed for local dev usually (traces are ephemeral)

volumes:
  sql_data:
  redis_data:
  seq_data: